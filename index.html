<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBB Fahrten-Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚂</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #eb0000; --red-dark: #c50000; --red-light: #fff1f1;
    --green: #2e7d32; --green-light: #e8f5e9;
    --blue: #1565c0; --blue-light: #e3f2fd;
    --g50: #f8f9fa; --g200: #e9ecef; --g300: #dee2e6;
    --g400: #ced4da; --g500: #adb5bd; --g600: #868e96; --g700: #495057; --g900: #212529;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--g50); color: var(--g900);
    min-height: 100dvh; -webkit-font-smoothing: antialiased;
    padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
  }
  .header { background: var(--red); color: white; padding: 20px 16px; }
  .header-inner { max-width: 560px; margin: 0 auto; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .container { max-width: 560px; margin: 0 auto; padding: 16px; }

  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; padding: 16px; }
  .card-label { font-size: 13px; font-weight: 600; color: var(--g700); margin-bottom: 8px; }
  .url-row { display: flex; gap: 8px; }
  .url-input {
    flex: 1; padding: 11px 12px; border: 1px solid var(--g300); border-radius: 8px;
    font-size: 14px; font-family: inherit; outline: none; min-width: 0;
  }
  .url-input:focus { border-color: var(--red); }
  .url-input::placeholder { color: var(--g400); }
  .btn {
    padding: 11px 18px; border: none; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-red { background: var(--red); color: white; }
  .btn-red:hover { background: var(--red-dark); }
  .btn-green { background: var(--green); color: white; }

  .preview {
    background: var(--g50); border: 1px solid var(--g200); border-radius: 10px;
    padding: 14px; margin-top: 12px; display: none;
  }
  .preview.show { display: block; }
  .preview-route { font-size: 16px; font-weight: 700; }
  .preview-via { font-size: 12px; color: var(--g500); margin-top: 2px; display: none; }
  .preview-meta { font-size: 13px; color: var(--g600); margin: 6px 0 12px; }
  .preview-fields { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .preview-fields .cur { font-size: 14px; color: var(--g600); font-weight: 600; }
  .preview-fields input[type="number"] {
    width: 110px; padding: 9px 12px; border: 1px solid var(--g300); border-radius: 8px;
    font-size: 15px; font-weight: 600; font-family: inherit; outline: none;
  }
  .preview-fields input:focus { border-color: var(--red); }
  .preview-fields select {
    padding: 9px 10px; border: 1px solid var(--g300); border-radius: 8px;
    font-size: 13px; font-family: inherit; background: white;
  }

  .msg {
    padding: 12px 16px; border-radius: var(--radius); margin-bottom: 12px;
    font-size: 13px; line-height: 1.5;
  }
  .msg-error { background: var(--red-light); border: 1px solid #ffcdd2; color: #c62828; }
  .msg-success { background: var(--green-light); border: 1px solid #a5d6a7; color: var(--green); }

  .btn-add {
    width: 100%; padding: 12px; background: white; border: 1.5px dashed var(--g300);
    border-radius: var(--radius); font-size: 13px; font-weight: 600; color: var(--g600);
    cursor: pointer; font-family: inherit; margin-bottom: 12px;
  }
  .manual-form { display: none; }
  .manual-form.show { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .form-input {
    padding: 10px 12px; border: 1px solid var(--g300); border-radius: 8px;
    font-size: 14px; font-family: inherit; outline: none; width: 100%;
  }
  .form-input:focus { border-color: var(--red); }
  .form-actions { display: flex; gap: 8px; }
  .btn-sec {
    padding: 10px 16px; background: none; color: var(--g600); border: 1px solid var(--g300);
    border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit;
  }

  .summary {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 16px 20px; margin-bottom: 12px; display: none;
    align-items: center; justify-content: space-between;
  }
  .summary.show { display: flex; }
  .s-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--g500); font-weight: 600; }
  .s-total { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-top: 2px; }
  .s-count { font-size: 13px; color: var(--g500); margin-left: 8px; font-weight: 400; }
  .btn-txt {
    background: none; border: none; font-size: 12px; color: var(--g500);
    cursor: pointer; padding: 8px 12px; border-radius: 8px; font-family: inherit;
  }
  .btn-txt:hover { color: var(--red); background: var(--red-light); }

  /* Trip rows */
  .trip-list { display: flex; flex-direction: column; gap: 8px; }
  .trip-card {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .trip-main { padding: 14px 16px; }
  .t-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
  .t-left { flex: 1; min-width: 0; }
  .t-header { display: flex; align-items: center; gap: 8px; }
  .t-num {
    width: 24px; height: 24px; background: var(--red-light); color: var(--red);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .t-route { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .t-arrow { color: var(--g400); margin: 0 3px; }
  .t-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .t-meta { display: flex; gap: 8px; font-size: 12px; color: var(--g500); flex-wrap: wrap; }
  .t-betreff { font-size: 12px; color: var(--g600); margin-top: 4px; font-style: italic; }
  .t-price { font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .t-actions { display: flex; gap: 1px; flex-shrink: 0; }
  .btn-del {
    background: none; border: none; color: var(--g400); cursor: pointer;
    padding: 5px; border-radius: 6px; display: flex;
  }
  .btn-del:hover { color: var(--red); background: var(--red-light); }
  .btn-del svg { width: 15px; height: 15px; }
  .btn-edit {
    background: none; border: none; color: var(--g400); cursor: pointer;
    padding: 5px; border-radius: 6px; display: flex;
  }
  .btn-edit:hover { color: var(--blue); background: var(--blue-light); }
  .btn-edit svg { width: 15px; height: 15px; }
  .btn-move {
    background: none; border: none; color: var(--g400); cursor: pointer;
    padding: 3px; border-radius: 6px; display: flex;
  }
  .btn-move:hover { color: var(--g700); background: var(--g200); }
  .btn-move:disabled { opacity: 0.2; cursor: default; }
  .btn-move:disabled:hover { color: var(--g400); background: none; }
  .btn-move svg { width: 14px; height: 14px; }

  /* Inline edit form */
  .edit-form { padding: 12px 16px; border-top: 1px solid var(--g200); background: var(--g50); }
  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .edit-grid input, .edit-grid select {
    padding: 8px 10px; border: 1px solid var(--g300); border-radius: 6px;
    font-size: 13px; font-family: inherit; outline: none; width: 100%;
  }
  .edit-grid input:focus, .edit-grid select:focus { border-color: var(--red); }
  .edit-actions { display: flex; gap: 8px; }
  .edit-actions button {
    padding: 8px 14px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .edit-save { background: var(--green); color: white; flex: 1; }
  .edit-cancel { background: none; color: var(--g600); border: 1px solid var(--g300) !important; }

  /* Attachment bar */
  .attach-bar {
    display: flex; align-items: center; gap: 8px; padding: 8px 16px;
    border-top: 1px solid var(--g200); background: var(--g50);
    flex-wrap: wrap;
  }
  .btn-attach {
    display: inline-flex; align-items: center; gap: 4px;
    background: none; border: 1px dashed var(--g300); border-radius: 6px;
    padding: 5px 10px; font-size: 12px; color: var(--g600);
    cursor: pointer; font-family: inherit; position: relative;
    overflow: hidden; flex-shrink: 0;
  }
  .btn-attach:hover { border-color: var(--g500); color: var(--g700); }
  .btn-attach input {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; font-size: 0;
  }
  .btn-attach svg { width: 14px; height: 14px; }

  /* Attachment chips */
  .att-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: white; border: 1px solid var(--g300); border-radius: 6px;
    padding: 4px 8px; font-size: 11px; color: var(--g700);
    cursor: pointer; text-decoration: none; max-width: 160px;
  }
  .att-chip:hover { border-color: var(--blue); color: var(--blue); }
  .att-chip .att-icon { flex-shrink: 0; font-size: 13px; }
  .att-chip .att-name {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .att-chip .att-x {
    flex-shrink: 0; color: var(--g400); font-size: 14px; margin-left: 2px;
    cursor: pointer; line-height: 1;
  }
  .att-chip .att-x:hover { color: var(--red); }

  .empty { text-align: center; color: var(--g400); font-size: 13px; padding: 36px 0; }
  .export { display: none; margin-top: 12px; gap: 8px; flex-wrap: wrap; }
  .export.show { display: flex; }
  .export button {
    flex: 1; min-width: calc(50% - 4px); padding: 10px; border: 1px solid var(--g300); background: white;
    border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--g700);
  }
  .export button:disabled { opacity: 0.5; cursor: wait; }
  .export .btn-zip { min-width: 100%; background: var(--g50); font-weight: 600; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 100; display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .lightbox.show { display: flex; }
  .lightbox img {
    max-width: 100%; max-height: 85vh; border-radius: 8px; object-fit: contain;
  }
  .lightbox iframe {
    width: 100%; height: 85vh; border: none; border-radius: 8px; background: white;
  }
  .lb-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.15); border: none; color: white;
    width: 40px; height: 40px; border-radius: 50%;
    font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .lb-close:hover { background: rgba(255,255,255,0.3); }
  .lb-dl {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: white; color: var(--g900); border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; text-decoration: none;
  }
</style>
</head>
<body>

<div class="header"><div class="header-inner">
  <h1>🚂 SBB Fahrten-Tracker</h1>
  <p>SBB-Link einfügen, Preis ergänzen, Belege anhängen</p>
</div></div>

<div class="container">
  <div class="card">
    <div class="card-label">SBB-Verbindungslink</div>
    <div class="url-row">
      <input type="url" class="url-input" id="urlIn" placeholder="sbb.ch Link hier einfügen..." autocomplete="off">
      <button class="btn btn-red" onclick="parseUrl()">Lesen</button>
    </div>
    <div class="preview" id="pv">
      <div class="preview-route" id="pvR"></div>
      <div class="preview-via" id="pvV"></div>
      <div class="preview-meta" id="pvM"></div>
      <div class="preview-fields">
        <span class="cur">CHF</span>
        <input type="number" step="0.05" id="pvP" placeholder="0.00" inputmode="decimal">
        <select id="pvK"><option value="2. Klasse">2. Kl.</option><option value="1. Klasse">1. Kl.</option></select>
        <select id="pvR2"><option value="einfach">Einfach</option><option value="retour">Retour</option></select>
        <input type="text" id="pvB" placeholder="Betreff (optional)" style="flex:1 1 100%;padding:9px 12px;border:1px solid var(--g300);border-radius:8px;font-size:13px;font-family:inherit;outline:none;margin-top:4px;">
        <button class="btn btn-green" onclick="confirmTrip()">Hinzufügen</button>
      </div>
    </div>
  </div>

  <div id="msgs"></div>

  <button class="btn-add" id="btnM" onclick="togM()">+ Manuell erfassen</button>
  <div class="card manual-form" id="mForm">
    <div class="form-grid">
      <input class="form-input" id="mV" placeholder="Von">
      <input class="form-input" id="mN" placeholder="Nach">
      <input class="form-input" id="mP" placeholder="CHF" type="number" step="0.05" inputmode="decimal">
      <input class="form-input" id="mD" type="date">
      <select class="form-input" id="mR"><option value="einfach">Einfach</option><option value="retour">Retour</option></select>
      <input class="form-input" id="mB" placeholder="Betreff (optional)" style="grid-column:1/-1">
    </div>
    <div class="form-actions">
      <button class="btn btn-red" style="flex:1" onclick="addM()">Hinzufügen</button>
      <button class="btn-sec" onclick="togM()">Abbrechen</button>
    </div>
  </div>

  <div class="summary" id="sum"><div><div class="s-label">Total</div><div class="s-total" id="tot"></div></div><button class="btn-txt" onclick="clr()">Alle löschen</button></div>
  <div class="trip-list" id="tl"></div>
  <div class="empty" id="emp">Noch keine Fahrten erfasst.</div>
  <div class="export" id="exp">
    <button onclick="csv()">📄 CSV</button>
    <button onclick="jsn()">📋 JSON</button>
    <button class="btn-zip" id="btnZip" onclick="exportZip()">📦 Alle Belege als ZIP exportieren</button>
  </div>
</div>

<!-- Lightbox for viewing attachments -->
<div class="lightbox" id="lb" onclick="closeLb(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <div id="lbContent"></div>
  <a class="lb-dl" id="lbDl" download>Herunterladen</a>
</div>

<script>
// ══════════════════════════════════════════
// IndexedDB for file storage
// ══════════════════════════════════════════
const DB_NAME = 'sbb-tracker-files';
const DB_VERSION = 1;
const STORE = 'attachments';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveFile(id, file) {
  const db = await openDB();
  const data = await file.arrayBuffer();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put({
      id,
      name: file.name,
      type: file.type,
      size: file.size,
      data,
      created: Date.now()
    });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function getFile(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

async function deleteFile(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function deleteFilesForTrip(tripId) {
  const trip = trips.find(t => t.id === tripId);
  if (trip && trip.files) {
    for (const f of trip.files) {
      await deleteFile(f.fileId).catch(() => {});
    }
  }
}

// ══════════════════════════════════════════
// Station mapping
// ══════════════════════════════════════════
const ST = {
  '8505000':'Luzern','8503000':'Zürich HB','8507000':'Bern','8500010':'Basel SBB',
  '8506000':'Lausanne','8501008':'Genève','8506302':'Montreux','8505004':'Zug',
  '8503006':'Zürich Oerlikon','8503020':'Zürich Stadelhofen','8501120':'Genève-Aéroport',
  '8500218':'Olten','8503510':'Winterthur','8506100':'Fribourg/Freiburg',
  '8505300':'Arth-Goldau','8507100':'Thun','8507483':'Interlaken Ost',
  '8507485':'Interlaken West','8508050':'Chur','8505200':'Rotkreuz',
  '8504100':'St. Gallen','8504300':'Romanshorn','8506400':'Visp','8506409':'Brig',
  '8501609':'Sion','8504500':'Buchs SG','8503504':'Schaffhausen',
  '8505226':'Engelberg','8508100':'Landquart','8508200':'Davos Platz',
  '8508500':'St. Moritz','8503203':'Rapperswil','8500073':'Aarau',
  '8500126':'Solothurn','8501689':'Martigny','8505002':'Emmenbrücke',
  '8509411':'Lugano','8509000':'Bellinzona','8509040':'Locarno',
  '8501000':'Biel/Bienne','8501100':'Neuchâtel','8503308':'Baden',
  '8500020':'Basel Bad Bf','8503001':'Zürich Flughafen',
};

// ══════════════════════════════════════════
// State
// ══════════════════════════════════════════
let trips = JSON.parse(localStorage.getItem('sbb-t') || '[]');
// Migrate old trips without files array
trips.forEach(t => { if (!t.files) t.files = []; if (!t.betreff) t.betreff = ''; });
let pend = null;

// ══════════════════════════════════════════
// URL Parsing
// ══════════════════════════════════════════
async function parseSbb(url) {
  const u = new URL(url);
  if (!u.hostname.includes('sbb.ch')) throw new Error('Kein SBB-Link');
  const p = u.searchParams;

  const stops = p.get('stops');
  if (stops) {
    const parts = stops.split('~');
    if (parts.length < 2) throw new Error('Start/Ziel nicht erkennbar');
    const pn = s => decodeURIComponent(s).replace(/_I\d+$/, '').replace(/\+/g, ' ').trim();
    const ns = parts.map(pn);
    return {
      von: ns[0], nach: ns[ns.length - 1],
      via: ns.length > 2 ? ns.slice(1, -1) : [],
      datum: p.get('day') || null,
      zeit: p.get('time') ? p.get('time').replace('_', ':') : null,
    };
  }

  const tid = p.get('tripId');
  if (tid) {
    const segs = tid.split('.');
    const last = segs[segs.length - 1];
    let b = last.replace(/-/g, '+').replace(/_/g, '/');
    b += '='.repeat((4 - b.length % 4) % 4);
    const raw = atob(b);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    const ds = new DecompressionStream('deflate');
    const w = ds.writable.getWriter(); w.write(bytes); w.close();
    const buf = await new Response(ds.readable).arrayBuffer();
    const j = JSON.parse(new TextDecoder().decode(new Uint8Array(buf)));
    const r = id => ST[id] || ('Station ' + id);
    return {
      von: r(j.O), nach: r(j.D),
      via: (j.vias || []).filter(Boolean).map(v => typeof v === 'object' ? r(v.id || v) : r(v)),
      datum: j.d || null, zeit: j.t || null,
    };
  }
  throw new Error('URL-Format nicht erkannt');
}

// ══════════════════════════════════════════
// Trip management
// ══════════════════════════════════════════
async function parseUrl() {
  const raw = document.getElementById('urlIn').value.trim();
  if (!raw) return;
  try {
    const d = await parseSbb(raw);
    pend = d;
    document.getElementById('pvR').textContent = d.von + ' → ' + d.nach;
    const vEl = document.getElementById('pvV');
    if (d.via.length) { vEl.textContent = 'via ' + d.via.join(', '); vEl.style.display = 'block'; }
    else vEl.style.display = 'none';
    const pts = [];
    if (d.datum) pts.push(fmtD(d.datum));
    if (d.zeit) pts.push(d.zeit + ' Uhr');
    document.getElementById('pvM').textContent = pts.join(' · ');
    document.getElementById('pvP').value = '';
    document.getElementById('pv').classList.add('show');
    setTimeout(() => document.getElementById('pvP').focus(), 100);
  } catch (e) { msg(e.message, 'error'); }
}

function confirmTrip() {
  if (!pend) return;
  const pr = parseFloat(document.getElementById('pvP').value);
  if (isNaN(pr) || pr <= 0) { msg('Bitte Preis eingeben.', 'error'); return; }
  const klasse = document.getElementById('pvK').value;
  const retour = document.getElementById('pvR2').value === 'retour';
  const betreff = document.getElementById('pvB').value.trim();

  trips.push({
    id: uid(), von: pend.von, nach: pend.nach, preis: pr,
    datum: pend.datum, klasse, betreff, files: []
  });
  if (retour) {
    trips.push({
      id: uid(), von: pend.nach, nach: pend.von, preis: pr,
      datum: pend.datum, klasse, betreff, files: []
    });
  }
  save();
  const label = pend.von + ' → ' + pend.nach + (retour ? ' (retour)' : '');
  msg(label + ' hinzugefügt!', 'success');
  pend = null;
  document.getElementById('pv').classList.remove('show');
  document.getElementById('urlIn').value = '';
  document.getElementById('pvB').value = '';
}

document.getElementById('pvP').addEventListener('keydown', e => { if (e.key === 'Enter') confirmTrip(); });
document.getElementById('urlIn').addEventListener('keydown', e => { if (e.key === 'Enter') parseUrl(); });

function togM() {
  const f = document.getElementById('mForm'), b = document.getElementById('btnM');
  const s = !f.classList.contains('show');
  f.classList.toggle('show', s); b.style.display = s ? 'none' : 'block';
}
function addM() {
  const v = document.getElementById('mV').value.trim(), n = document.getElementById('mN').value.trim(),
    pr = parseFloat(document.getElementById('mP').value), d = document.getElementById('mD').value;
  const retour = document.getElementById('mR').value === 'retour';
  const betreff = document.getElementById('mB').value.trim();
  if (!v || !n || isNaN(pr)) { msg('Von, Nach und Preis ausfüllen.', 'error'); return; }
  trips.push({ id: uid(), von: v, nach: n, preis: pr, datum: d || null, klasse: null, betreff, files: [] });
  if (retour) {
    trips.push({ id: uid(), von: n, nach: v, preis: pr, datum: d || null, klasse: null, betreff, files: [] });
  }
  save();
  const label = v + ' → ' + n + (retour ? ' (retour)' : '');
  msg(label + ' hinzugefügt!', 'success');
  ['mV', 'mN', 'mP', 'mD', 'mB'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('mR').value = 'einfach';
  togM();
}

// ══════════════════════════════════════════
// Attachments
// ══════════════════════════════════════════
async function attachFile(tripId, inputEl) {
  const files = inputEl.files;
  if (!files.length) return;

  const trip = trips.find(t => t.id === tripId);
  if (!trip) return;

  for (const file of files) {
    // Validate type
    const ok = file.type.startsWith('image/') || file.type === 'application/pdf';
    if (!ok) { msg('Nur Bilder und PDFs erlaubt.', 'error'); continue; }
    // Max 20MB per file
    if (file.size > 20 * 1024 * 1024) { msg('Datei zu gross (max 20MB).', 'error'); continue; }

    const fileId = 'f_' + uid();
    try {
      await saveFile(fileId, file);
      trip.files.push({
        fileId,
        name: file.name,
        type: file.type,
        size: file.size,
      });
    } catch (e) {
      msg('Fehler beim Speichern: ' + e.message, 'error');
    }
  }

  save();
  msg(files.length + (files.length === 1 ? ' Datei' : ' Dateien') + ' angehängt!', 'success');
  inputEl.value = '';
}

async function removeAttachment(tripId, fileId) {
  const trip = trips.find(t => t.id === tripId);
  if (!trip) return;
  await deleteFile(fileId).catch(() => {});
  trip.files = trip.files.filter(f => f.fileId !== fileId);
  save();
}

async function viewAttachment(fileId, fileName) {
  try {
    const file = await getFile(fileId);
    if (!file) { msg('Datei nicht gefunden.', 'error'); return; }

    const blob = new Blob([file.data], { type: file.type });
    const url = URL.createObjectURL(blob);
    const lb = document.getElementById('lb');
    const content = document.getElementById('lbContent');
    const dlBtn = document.getElementById('lbDl');

    if (file.type.startsWith('image/')) {
      content.innerHTML = '<img src="' + url + '" alt="' + esc(fileName) + '">';
    } else if (file.type === 'application/pdf') {
      content.innerHTML = '<iframe src="' + url + '"></iframe>';
    }

    dlBtn.href = url;
    dlBtn.download = fileName;
    lb.classList.add('show');

    // Cleanup URL when closing
    lb._blobUrl = url;
  } catch (e) {
    msg('Fehler beim Laden: ' + e.message, 'error');
  }
}

function closeLb(event) {
  if (event && event.target !== document.getElementById('lb') && !event.target.classList.contains('lb-close')) return;
  const lb = document.getElementById('lb');
  lb.classList.remove('show');
  if (lb._blobUrl) { URL.revokeObjectURL(lb._blobUrl); lb._blobUrl = null; }
  document.getElementById('lbContent').innerHTML = '';
}

// ══════════════════════════════════════════
// Render
// ══════════════════════════════════════════
function render() {
  const l = document.getElementById('tl'), s = document.getElementById('sum'),
    e = document.getElementById('emp'), x = document.getElementById('exp');
  if (!trips.length) {
    l.innerHTML = ''; s.classList.remove('show'); e.style.display = 'block'; x.classList.remove('show'); return;
  }
  e.style.display = 'none'; x.classList.add('show');
  const tot = trips.reduce((a, t) => a + t.preis, 0), n = trips.length;
  s.classList.add('show');
  document.getElementById('tot').innerHTML =
    'CHF ' + tot.toFixed(2) + '<span class="s-count">' + n + (n === 1 ? ' Fahrt' : ' Fahrten') + '</span>';

  l.innerHTML = trips.map((t, i) => {
    const filesHtml = (t.files || []).map(f => {
      const icon = f.type === 'application/pdf' ? '📄' : '🖼️';
      return `<span class="att-chip" onclick="viewAttachment('${f.fileId}','${esc(f.name)}')" title="${esc(f.name)}">
        <span class="att-icon">${icon}</span>
        <span class="att-name">${esc(f.name)}</span>
        <span class="att-x" onclick="event.stopPropagation();removeAttachment('${t.id}','${f.fileId}')" title="Entfernen">×</span>
      </span>`;
    }).join('');

    return `<div class="trip-card" id="tc-${t.id}">
      <div class="trip-main" id="tv-${t.id}">
        <div class="t-top">
          <div class="t-left">
            <div class="t-header">
              <div class="t-num">${i + 1}</div>
              <div class="t-route">${esc(t.von)}<span class="t-arrow">→</span>${esc(t.nach)}</div>
            </div>
            ${t.betreff ? '<div class="t-betreff">' + esc(t.betreff) + '</div>' : ''}
          </div>
          <div class="t-actions">
            <button class="btn-move" onclick="moveTrip('${t.id}',-1)" title="Nach oben"${i === 0 ? ' disabled' : ''}>
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
            </button>
            <button class="btn-move" onclick="moveTrip('${t.id}',1)" title="Nach unten"${i === trips.length - 1 ? ' disabled' : ''}>
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <button class="btn-edit" onclick="startEdit('${t.id}')" title="Bearbeiten">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button class="btn-del" onclick="del('${t.id}')" title="Löschen">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
        <div class="t-bottom">
          <div class="t-meta">
            ${t.datum ? '<span>' + fmtD(t.datum) + '</span>' : ''}
            ${t.klasse ? '<span>' + esc(t.klasse) + '</span>' : ''}
          </div>
          <div class="t-price">CHF ${t.preis.toFixed(2)}</div>
        </div>
      </div>
      <div class="edit-form" id="ef-${t.id}" style="display:none;">
        <div class="edit-grid">
          <input id="ev-${t.id}" value="${esc(t.von)}" placeholder="Von">
          <input id="en-${t.id}" value="${esc(t.nach)}" placeholder="Nach">
          <input id="ep-${t.id}" value="${t.preis}" type="number" step="0.05" placeholder="CHF" inputmode="decimal">
          <input id="ed-${t.id}" value="${t.datum || ''}" type="date">
          <select id="ek-${t.id}">
            <option value="2. Klasse"${t.klasse === '2. Klasse' ? ' selected' : ''}>2. Klasse</option>
            <option value="1. Klasse"${t.klasse === '1. Klasse' ? ' selected' : ''}>1. Klasse</option>
          </select>
          <input id="eb-${t.id}" value="${esc(t.betreff || '')}" placeholder="Betreff (optional)" style="grid-column:1/-1">
        </div>
        <div class="edit-actions">
          <button class="edit-save" onclick="saveEdit('${t.id}')">Speichern</button>
          <button class="edit-cancel" onclick="cancelEdit('${t.id}')">Abbrechen</button>
        </div>
      </div>
      <div class="attach-bar" id="ab-${t.id}">
        <label class="btn-attach">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
          Beleg
          <input type="file" accept="image/*,application/pdf" multiple onchange="attachFile('${t.id}',this)">
        </label>
        ${filesHtml}
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// Reorder trips
// ══════════════════════════════════════════
function moveTrip(id, dir) {
  const idx = trips.findIndex(t => t.id === id);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= trips.length) return;
  const tmp = trips[idx];
  trips[idx] = trips[newIdx];
  trips[newIdx] = tmp;
  save();
}

// ══════════════════════════════════════════
// Edit trips
// ══════════════════════════════════════════
function startEdit(id) {
  // Hide view, show edit form
  document.getElementById('tv-' + id).style.display = 'none';
  document.getElementById('ab-' + id).style.display = 'none';
  document.getElementById('ef-' + id).style.display = 'block';
}

function cancelEdit(id) {
  // Restore view
  document.getElementById('tv-' + id).style.display = 'flex';
  document.getElementById('ab-' + id).style.display = 'flex';
  document.getElementById('ef-' + id).style.display = 'none';
  render(); // Reset input values
}

function saveEdit(id) {
  const trip = trips.find(t => t.id === id);
  if (!trip) return;
  const von = document.getElementById('ev-' + id).value.trim();
  const nach = document.getElementById('en-' + id).value.trim();
  const preis = parseFloat(document.getElementById('ep-' + id).value);
  const datum = document.getElementById('ed-' + id).value;
  const klasse = document.getElementById('ek-' + id).value;
  const betreff = document.getElementById('eb-' + id).value.trim();

  if (!von || !nach || isNaN(preis)) { msg('Von, Nach und Preis ausfüllen.', 'error'); return; }

  trip.von = von;
  trip.nach = nach;
  trip.preis = preis;
  trip.datum = datum || null;
  trip.klasse = klasse;
  trip.betreff = betreff;

  save();
  msg(von + ' → ' + nach + ' aktualisiert!', 'success');
}

// ══════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════
function save() { localStorage.setItem('sbb-t', JSON.stringify(trips)); render(); }
async function del(id) {
  const t = trips.find(x => x.id === id);
  const label = t ? (t.von + ' → ' + t.nach) : 'Fahrt';
  if (!confirm(label + ' wirklich löschen?')) return;
  await deleteFilesForTrip(id); trips = trips.filter(x => x.id !== id); save();
}
async function clr() {
  if (!confirm('Alle Fahrten und Belege löschen?')) return;
  for (const t of trips) { await deleteFilesForTrip(t.id); }
  trips = []; save();
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtD(d) { try { return new Date(d + 'T00:00:00').toLocaleDateString('de-CH'); } catch { return d; } }
function msg(t, type = 'info') {
  const el = document.createElement('div'); el.className = 'msg msg-' + type; el.textContent = t;
  document.getElementById('msgs').prepend(el); setTimeout(() => el.remove(), 4000);
}

function csv() {
  const r = ['Von,Nach,Preis,Datum,Klasse,Betreff,Belege'];
  trips.forEach(t => {
    const fNames = (t.files || []).map(f => f.name).join('; ');
    r.push(`"${t.von}","${t.nach}",${t.preis.toFixed(2)},${t.datum || ''},${t.klasse || ''},"${t.betreff || ''}","${fNames}"`);
  });
  r.push(`"","TOTAL",${trips.reduce((s, t) => s + t.preis, 0).toFixed(2)},,,,`);
  dl('sbb-fahrten.csv', 'text/csv', r.join('\n'));
}
function jsn() {
  const tot = trips.reduce((s, t) => s + t.preis, 0);
  dl('sbb-fahrten.json', 'application/json', JSON.stringify({
    fahrten: trips, total: Math.round(tot * 100) / 100, anzahl: trips.length
  }, null, 2));
}
function dl(n, t, c) {
  const bom = t.includes('csv') ? '\uFEFF' : '';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([bom + c], { type: t + ';charset=utf-8' }));
  a.download = n; document.body.append(a); a.click(); a.remove();
}

// Init
render();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
async function exportZip() {
  // Collect all files across all trips
  const allFiles = [];
  for (const t of trips) {
    if (!t.files || !t.files.length) continue;
    for (const f of t.files) {
      allFiles.push({
        tripLabel: t.von + ' - ' + t.nach + (t.datum ? ' (' + t.datum + ')' : ''),
        fileId: f.fileId,
        name: f.name,
      });
    }
  }

  if (!allFiles.length) {
    msg('Keine Belege zum Exportieren vorhanden.', 'error');
    return;
  }

  const btn = document.getElementById('btnZip');
  btn.disabled = true;
  btn.textContent = '⏳ ZIP wird erstellt...';

  try {
    const zip = new JSZip();

    // Group by trip, create subfolders
    const folderMap = {};
    let folderIdx = 0;

    for (const af of allFiles) {
      if (!folderMap[af.tripLabel]) {
        folderIdx++;
        const folderName = String(folderIdx).padStart(2, '0') + ' ' +
          af.tripLabel.replace(/[\/\\:*?"<>|]/g, '_');
        folderMap[af.tripLabel] = zip.folder(folderName);
      }

      const fileData = await getFile(af.fileId);
      if (fileData) {
        folderMap[af.tripLabel].file(af.name, fileData.data);
      }
    }

    // Add CSV summary
    const csvRows = ['Von,Nach,Preis,Datum,Klasse,Betreff,Belege'];
    trips.forEach(t => {
      const fNames = (t.files || []).map(f => f.name).join('; ');
      csvRows.push('"' + t.von + '","' + t.nach + '",' + t.preis.toFixed(2) + ',' + (t.datum||'') + ',' + (t.klasse||'') + ',"' + (t.betreff||'') + '","' + fNames + '"');
    });
    const tot = trips.reduce((s,t) => s + t.preis, 0);
    csvRows.push('"","TOTAL",' + tot.toFixed(2) + ',,,,');
    zip.file('uebersicht.csv', '\uFEFF' + csvRows.join('\n'));

    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'sbb-belege-' + new Date().toISOString().slice(0, 10) + '.zip';
    document.body.append(a);
    a.click();
    a.remove();

    msg(allFiles.length + ' Belege als ZIP exportiert!', 'success');
  } catch (e) {
    console.error(e);
    msg('Fehler beim ZIP-Export: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '📦 Alle Belege als ZIP exportieren';
}
</script>
