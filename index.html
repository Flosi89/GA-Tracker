<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1050a0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spesen">
<link rel="manifest" href="manifest.json">
<title>Spesen-Tracker</title>
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #dc2626; --red-dark: #b91c1c; --red-light: #fef2f2;
    --green: #40c040; --green-light: #eafaea;
    --blue: #1050a0; --blue-light: #e6eef8;
    --brand: #1050a0; --brand-dark: #0c3d7a; --brand-light: #e6eef8;
    --accent: #40c040; --accent-light: #eafaea;
    --header: #1050a0; --header-sub: #7eaadb;
    --g50: #f8f9fa; --g200: #e9ecef; --g300: #dee2e6;
    --g400: #ced4da; --g500: #adb5bd; --g600: #868e96; --g700: #495057; --g900: #212529;
    --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--g50); color: var(--g900);
    min-height: 100dvh; -webkit-font-smoothing: antialiased;
    padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
  }
  .header { background:var(--header); color: white; padding: 20px 16px; }
  .header-inner { max-width: 560px; margin: 0 auto; }
  .header-logo { width:40px; height:40px; background:white; border-radius:10px; padding:4px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header-logo img { width:100%; height:100%; object-fit:contain; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing:-0.3px; }
  .container { max-width: 560px; margin: 0 auto; padding: 16px; }
  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; padding: 16px; }
  .input-card { padding: 0; overflow: hidden; }
  .tab-bar { display:flex; border-bottom:1px solid var(--g200); }
  .tab { flex:1; padding:14px; background:none; border:none; font-size:14px; font-weight:600; color:var(--g500); cursor:pointer; font-family:inherit; position:relative; transition:color 0.15s; }
  .tab:hover { color:var(--g700); }
  .tab.active { color:var(--brand); }
  .tab.active::after { content:''; position:absolute; bottom:0; left:16px; right:16px; height:3px; background:var(--brand); border-radius:3px 3px 0 0; }
  .tab-content { padding:16px; }
  .pv-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  .pv-grid input, .pv-grid select { padding:9px 10px; border:1px solid var(--g300); border-radius:8px; font-size:13px; font-family:inherit; background:white; outline:none; width:100%; }
  .pv-grid input:focus, .pv-grid select:focus { border-color:var(--brand); }
  .btn-sbb { flex:1; text-align:center; background:var(--g700); color:white; text-decoration:none; font-size:13px; padding:10px; border-radius:8px; }
  .card-label { font-size: 13px; font-weight: 600; color: var(--g700); margin-bottom: 8px; }
  .url-row { display: flex; gap: 8px; }
  .btn-paste { padding:11px; border:1px solid var(--g300); border-radius:8px; background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--g600); transition:all 0.15s; }
  .btn-paste:hover { border-color:var(--g500); color:var(--g900); }
  .btn-paste:active { transform:scale(0.95); }
  .btn-paste svg { width:18px; height:18px; }
  .url-input { flex:1; padding:11px 12px; border:1px solid var(--g300); border-radius:8px; font-size:14px; font-family:inherit; outline:none; min-width:0; }
  .url-input:focus { border-color: var(--brand); }
  .url-input::placeholder { color: var(--g400); }
  .btn { padding:11px 18px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn-red { background: var(--brand); color: white; }
  .btn-red:hover { background: var(--brand-dark); }
  .btn-green { background: var(--accent); color: white; }
  .preview { background:var(--g50); border:1px solid var(--g200); border-radius:10px; padding:14px; margin-top:12px; display:none; }
  .preview.show { display: block; }
  .preview-route { font-size:17px; font-weight:700; }
  .preview-via { font-size:12px; color:var(--g500); margin-top:2px; display:none; }
  .preview-meta { font-size:13px; color:var(--g600); margin-top:4px; }
  .price-preview { margin-top:8px; padding:8px 12px; background:var(--brand-light); border-radius:8px; font-size:13px; font-weight:600; color:var(--brand); text-align:center; }
  .msg { padding:12px 16px; border-radius:var(--radius); margin-bottom:12px; font-size:13px; line-height:1.5; }
  .msg-error { background:var(--red-light); border:1px solid #ffcdd2; color:#c62828; }
  .msg-success { background:var(--accent-light); border:1px solid var(--accent); color:#1a7a1e; }
  .form-input { padding:10px 12px; border:1px solid var(--g300); border-radius:8px; font-size:14px; font-family:inherit; outline:none; width:100%; }
  .form-input:focus { border-color: var(--brand); }

  /* Filter bar */
  /* Toolbar */
  .toolbar { display:none; gap:8px; margin-bottom:12px; }
  .toolbar.show { display:flex; }
  .toolbar-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px; background:white; border:1px solid var(--g300); border-radius:8px; font-size:13px; font-weight:600; color:var(--g600); cursor:pointer; font-family:inherit; transition:all 0.15s; }
  .toolbar-btn:hover { border-color:var(--brand); color:var(--brand); }
  .toolbar-btn.active { background:var(--brand-light); border-color:var(--brand); color:var(--brand); }
  .filter-bar { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 16px; margin-bottom:12px; display:none; }
  .filter-bar.show { display: block; }
  .filter-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .filter-cell { display:flex; flex-direction:column; gap:3px; }
  .filter-cell label { font-size:10px; font-weight:600; color:var(--g500); text-transform:uppercase; letter-spacing:0.5px; }
  .filter-cell select, .filter-cell input { padding:9px 10px; border:1px solid var(--g300); border-radius:8px; font-size:13px; font-family:inherit; background:white; outline:none; width:100%; appearance:auto; }
  .filter-cell select:focus, .filter-cell input:focus { border-color:var(--brand); }
  .filter-actions { display:flex; justify-content:flex-end; margin-top:8px; }
  .filter-reset { background:none; border:none; color:var(--g500); font-size:12px; cursor:pointer; font-family:inherit; text-decoration:underline; padding:4px 0; }

  /* Summary */
  .summary { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; margin-bottom:12px; display:none; }
  .summary.show { display: block; }
  .s-top { display:flex; align-items:flex-start; justify-content:space-between; }
  .s-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--g500); font-weight:600; }
  .s-total { font-size:32px; font-weight:700; letter-spacing:-0.5px; margin-top:2px; line-height:1.1; }
  .s-count { font-size:13px; color:var(--g500); font-weight:400; display:block; margin-top:2px; }
  .s-filtered { font-size:11px; color:var(--blue); margin-top:6px; }
  .ga-widget { text-align:right; min-width:120px; }
  .ga-widget .ga-label { font-size:10px; color:var(--g500); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
  .ga-widget .ga-val { font-size:16px; font-weight:700; color:var(--g900); margin-top:2px; }
  .ga-widget .ga-bar { height:5px; background:var(--g200); border-radius:3px; margin-top:4px; overflow:hidden; }
  .ga-widget .ga-bar-fill { height:100%; border-radius:3px; transition:width 0.3s; }
  .ga-widget .ga-sub { font-size:10px; color:var(--g500); margin-top:2px; }
  .toolbar-btn .badge { display:inline-flex; align-items:center; justify-content:center; width:6px; height:6px; background:var(--brand); border-radius:50%; margin-left:2px; }
  .kat-breakdown { margin-top:14px; padding-top:14px; border-top:1px solid var(--g200); display:grid; gap:0; }
  .kat-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--g200); }
  .kat-row:last-child { border-bottom:none; }
  .kat-left { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--g700); }
  .kat-icon { font-size:16px; width:24px; text-align:center; }
  .kat-name { font-weight:500; }
  .kat-count { color:var(--g500); font-size:12px; }
  .kat-right { font-size:14px; font-weight:700; color:var(--g900); }
  .kat-bar { height:4px; background:var(--g200); border-radius:2px; margin-top:4px; overflow:hidden; }
  .kat-bar-fill { height:100%; background:var(--brand); border-radius:2px; }
  .btn-txt { background:none; border:none; font-size:12px; color:var(--g500); cursor:pointer; padding:8px 12px; border-radius:8px; font-family:inherit; }
  .btn-txt:hover { color:var(--red); background:var(--red-light); }

  /* Stats */
  .stats { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; margin-bottom:12px; display:none; }
  .stats.show { display: block; }
  .stats h3 { font-size:15px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:6px; }
  .stat-section { margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--g200); }
  .stat-section:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .stat-title { font-size:10px; font-weight:600; color:var(--g500); margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
  .bar-chart { display:flex; flex-direction:column; gap:8px; }
  .bar-row { display:grid; grid-template-columns:auto 1fr 70px; align-items:center; gap:8px; }
  .bar-label { text-align:right; color:var(--g600); font-size:12px; font-weight:500; min-width:40px; white-space:nowrap; }
  .bar-track { height:24px; background:var(--g200); border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; background:linear-gradient(90deg, var(--brand), var(--accent)); border-radius:6px; transition:width 0.3s ease; min-width:3px; }
  .bar-val { font-weight:700; color:var(--g900); font-size:13px; }
  .stat-list { display:flex; flex-direction:column; }
  .stat-row { display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:8px 0; border-bottom:1px solid var(--g200); }
  .stat-row:last-child { border-bottom:none; }
  .stat-row .label { color:var(--g700); flex:1; min-width:0; }
  .stat-row .label .sub { color:var(--g500); font-size:11px; }
  .stat-row .value { font-weight:700; color:var(--g900); flex-shrink:0; margin-left:8px; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .stat-card { background:var(--g50); border-radius:10px; padding:16px; text-align:center; }
  .stat-card .sc-val { font-size:22px; font-weight:700; color:var(--g900); }
  .stat-card .sc-label { font-size:12px; color:var(--g500); margin-top:2px; font-weight:600; }
  .stat-card .sc-sub { font-size:10px; color:var(--g400); margin-top:4px; }

  /* Odoo settings */
  .odoo-setup { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:12px; }
  .odoo-setup summary { font-size:13px; font-weight:600; color:var(--g700); cursor:pointer; list-style:none; display:flex; align-items:center; gap:6px; }
  .odoo-setup summary::before { content:'⚙️'; }
  .odoo-setup[open] summary { margin-bottom:12px; }
  .odoo-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .odoo-grid input { padding:9px 12px; border:1px solid var(--g300); border-radius:8px; font-size:13px; font-family:inherit; outline:none; width:100%; }
  .odoo-grid input:focus { border-color:var(--brand); }
  .odoo-hint { font-size:11px; color:var(--g500); margin-top:8px; line-height:1.5; grid-column:1/-1; }
  /* Old button styles removed, using .btn-act now */
  .trip-card.archived { opacity:0.55; }
  .trip-card.archived .trip-main { background:var(--g50); }
  .t-archived-badge { display:inline-block; font-size:10px; background:var(--accent-light); color:var(--accent); padding:2px 6px; border-radius:4px; font-weight:600; margin-left:6px; vertical-align:middle; }
  .btn-odoo-all { width:100%; padding:10px; border:1px solid #7c3aed; background:#f3e8ff; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; color:#7c3aed; margin-top:4px; }
  .btn-odoo-all:hover { background:#ede4ff; }
  .btn-odoo-all:disabled { opacity:0.5; cursor:wait; }

  /* Trip cards */
  .trip-list { display:flex; flex-direction:column; gap:8px; }
  .trip-card { background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; border-left:4px solid var(--g300); }
  .trip-main { padding:14px 16px; }
  .t-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
  .t-left { flex:1; min-width:0; }
  .t-header { display:flex; align-items:center; gap:8px; }
  .t-num { width:24px; height:24px; background:var(--brand-light); color:var(--brand); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
  .t-route { font-size:15px; font-weight:600; line-height:1.3; }
  .t-arrow { color:var(--g400); margin:0 3px; }
  .t-bottom { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .t-meta { display:flex; gap:8px; font-size:12px; color:var(--g500); flex-wrap:wrap; align-items:center; }
  .t-betreff { font-size:12px; color:var(--g600); margin-top:4px; font-style:italic; }
  .t-price { font-size:16px; font-weight:700; flex-shrink:0; margin-left:auto; }
  .t-actions { display:flex; gap:2px; flex-shrink:0; }
  .btn-act { background:none; border:none; color:var(--g400); cursor:pointer; padding:6px; border-radius:6px; display:flex; }
  .btn-act:hover { color:var(--g700); background:var(--g200); }
  .btn-act.is-archived { color:var(--accent); }
  .btn-act svg { width:16px; height:16px; }
  .btn-act.danger:hover { color:var(--red); background:var(--red-light); }
  .t-actions-expand { display:none; } /* deprecated */
  .t-expand { display:none; border-top:1px solid var(--g200); background:var(--g50); }
  .t-expand.show { display:block; }
  .t-expand-section { padding:10px 16px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .t-expand-actions { padding:8px 16px; border-top:1px solid var(--g200); display:flex; gap:4px; justify-content:flex-end; flex-wrap:wrap; }
  .beleg-ok { display:inline-flex; align-items:center; gap:3px; font-size:10px; color:var(--accent); font-weight:600; margin-left:auto; flex-shrink:0; }
  .beleg-missing { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; font-size:10px; font-weight:700; color:#d97706; background:#fef3c7; border-radius:50%; margin-left:auto; flex-shrink:0; }
  .empty { text-align:center; color:var(--g400); font-size:13px; padding:36px 0; }
  .t-expand-actions .btn-act { padding:8px 12px; font-size:11px; gap:4px; color:var(--g600); }
  .t-expand-actions .btn-act span { font-size:11px; }
  .edit-form { padding:16px; border-top:1px solid var(--g200); background:var(--g50); }
  .edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .edit-grid input,.edit-grid select { padding:9px 10px; border:1px solid var(--g300); border-radius:8px; font-size:13px; font-family:inherit; outline:none; width:100%; }
  .edit-grid input:focus,.edit-grid select:focus { border-color:var(--brand); }
  .edit-actions { display:flex; gap:8px; }
  .edit-actions button { padding:8px 14px; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
  .edit-save { background:var(--accent); color:white; flex:1; }
  .edit-cancel { background:none; color:var(--g600); border:1px solid var(--g300) !important; }
  .btn-attach { display:inline-flex; align-items:center; gap:4px; background:white; border:1px solid var(--g300); border-radius:8px; padding:6px 12px; font-size:12px; color:var(--g600); cursor:pointer; font-family:inherit; position:relative; overflow:hidden; flex-shrink:0; transition:all 0.15s; }
  .quick-attach { padding:8px 16px; border-top:1px solid var(--g200); display:flex; gap:6px; }
  .btn-attach:hover { border-color:var(--brand); color:var(--brand); }
  .btn-attach input { position:absolute; inset:0; width:100%; height:100%; opacity:0; cursor:pointer; font-size:0; }
  .btn-attach svg { width:14px; height:14px; }
  .att-chip { display:inline-flex; align-items:center; gap:4px; background:var(--g50); border:1px solid var(--g300); border-radius:8px; padding:5px 10px; font-size:11px; color:var(--g700); cursor:pointer; text-decoration:none; max-width:180px; font-weight:500; }
  .att-chip:hover { border-color:var(--brand); color:var(--brand); }
  .att-chip .att-icon { flex-shrink:0; font-size:12px; }
  .att-chip .att-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .att-chip .att-x { flex-shrink:0; color:var(--g500); font-size:14px; margin-left:2px; cursor:pointer; line-height:1; }
  .att-chip .att-x:hover { color:var(--red); }
  .export-panel { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-top:12px; }
  .export-panel summary { font-size:13px; font-weight:600; color:var(--g700); cursor:pointer; list-style:none; }
  .export-panel summary::marker { display:none; }
  .export-panel[open] summary { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--g200); }
  .export-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .export-btn { padding:10px; border:1px solid var(--g300); background:white; border-radius:8px; font-size:13px; cursor:pointer; font-family:inherit; color:var(--g700); transition:all 0.15s; }
  .export-btn:hover { border-color:var(--brand); color:var(--brand); }
  .export-btn.primary { grid-column:1/-1; background:var(--brand); color:white; border-color:var(--brand); font-weight:600; }
  .export-btn.primary:hover { background:var(--brand-dark); }
  .export-btn.odoo { grid-column:1/-1; background:white; border:1px solid var(--brand); color:var(--brand); font-weight:600; }
  .export-btn:disabled { opacity:0.5; cursor:wait; }
  .btn-danger-text { background:none; border:none; color:var(--g400); font-size:11px; cursor:pointer; font-family:inherit; margin-top:12px; padding:0; }
  .btn-danger-text:hover { color:var(--red); }
  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; display:none; align-items:center; justify-content:center; padding:20px; }
  .lightbox.show { display:flex; }
  .lightbox img { max-width:100%; max-height:85vh; border-radius:8px; object-fit:contain; }
  .lightbox iframe { width:100%; height:85vh; border:none; border-radius:8px; background:white; }
  .lb-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.15); border:none; color:white; width:40px; height:40px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .lb-dl { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:white; color:var(--g900); border:none; border-radius:8px; padding:10px 20px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; text-decoration:none; }
</style>
</head>
<body>
<div class="header"><div class="header-inner">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="header-logo"><img src="logo.png" alt=""></div>
    <div>
      <h1>Spesen-Tracker</h1>
    </div>
  </div>
</div></div>
<div class="container">
  <!-- Unified input card -->
  <div class="card input-card">
    <div class="tab-bar">
      <button class="tab active" id="tabLink" onclick="switchTab('link')">SBB Link</button>
      <button class="tab" id="tabManual" onclick="switchTab('manual')">Manuell</button>
    </div>

    <!-- Tab: SBB Link -->
    <div class="tab-content" id="tcLink">
      <div class="url-row">
        <button class="btn-paste" onclick="autoPaste()" title="Einfügen">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        </button>
        <input type="url" class="url-input" id="urlIn" placeholder="sbb.ch Link einfügen..." autocomplete="off">
        <button class="btn btn-red" onclick="parseUrl()">Lesen</button>
      </div>
      <div class="preview" id="pv">
        <div class="preview-route" id="pvR"></div>
        <div class="preview-via" id="pvV"></div>

const DB='sbb-files',STORE='attachments';
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(STORE))e.target.result.createObjectStore(STORE,{keyPath:'id'})};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function saveFile(id,file){const db=await openDB(),d=await file.arrayBuffer();return new Promise((r,j)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put({id,name:file.name,type:file.type,size:file.size,data:d,created:Date.now()});tx.oncomplete=()=>r();tx.onerror=()=>j(tx.error)})}
async function getFile(id){const db=await openDB();return new Promise((r,j)=>{const tx=db.transaction(STORE,'readonly');const q=tx.objectStore(STORE).get(id);q.onsuccess=()=>r(q.result||null);q.onerror=()=>j(q.error)})}
async function deleteFile(id){const db=await openDB();return new Promise((r,j)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=()=>r();tx.onerror=()=>j(tx.error)})}
async function deleteFilesForTrip(tid){const t=trips.find(x=>x.id===tid);if(t&&t.files)for(const f of t.files)await deleteFile(f.fileId).catch(()=>{})}

  // Migrate old categories
  const KAT_MIGRATE={'ÖV-Reise':'Reisekosten GSI & VS (öV)','Essen':'Verpflegung GSI & VS - Mittagessen','Unterkunft':'Übernachtung GSI & VS','Material':'Büromaterial','Sonstiges':'Sonstiger Personalaufwand inkl. Anlässe'};
  if(KAT_MIGRATE[t.kategorie]) t.kategorie=KAT_MIGRATE[t.kategorie];
});

// Auto-merge retour pairs
(function mergeRetour(){
  const toRemove = new Set();
  for (let i = 0; i < trips.length; i++) {
    if (toRemove.has(trips[i].id) || !trips[i].von || !trips[i].nach || trips[i].retour) continue;
    for (let j = i + 1; j < trips.length; j++) {
      if (toRemove.has(trips[j].id) || trips[j].retour) continue;
      if (trips[j].von === trips[i].nach && trips[j].nach === trips[i].von
          && trips[j].datum === trips[i].datum && trips[j].preis === trips[i].preis
          && trips[j].betreff === trips[i].betreff && trips[j].kategorie === trips[i].kategorie) {
        trips[i].retour = true;
        trips[i].preis = trips[i].preis * 2;
        trips[i].files = [...trips[i].files, ...(trips[j].files||[])];
        if (trips[j].archived) trips[i].archived = true;
        toRemove.add(trips[j].id);
        break;
      }
    }
  }
  if (toRemove.size > 0) {
    trips = trips.filter(t => !toRemove.has(t.id));
    localStorage.setItem('sbb-trips', JSON.stringify(trips));
  }
})();

// ══════════════════════════════════════════
// URL Parsing
// ══════════════════════════════════════════
async function resolveShortLink(url) {
  // Try to resolve a.sbbmobile.ch short links
  try {
    const res = await fetch(url, { redirect: 'follow', mode: 'cors' });
    // If we got redirected to sbb.ch, use that URL
    if (res.url && res.url.includes('sbb.ch')) return res.url;
    // Try to find a redirect in the HTML
    const html = await res.text();
    const match = html.match(/https?:\/\/[^\s"']+sbb\.ch[^\s"']*/);
    if (match) return match[0];
  } catch(e) {
    // CORS blocked — try no-cors to see if redirect happens
    try {
      const res = await fetch(url, { redirect: 'follow', mode: 'no-cors' });
      if (res.url && res.url.includes('sbb.ch')) return res.url;
    } catch(e2) {}
  }
  return null;
}

function extractSbbUrl(text) {
  // Find any SBB URL in text (full or short)
  const full = text.match(/https?:\/\/[^\s]*sbb\.ch[^\s]*/);
  if (full) return full[0];
  const short = text.match(/https?:\/\/[^\s]*sbbmobile\.ch[^\s]*/);
  if (short) return short[0];
  return text.trim();
}

async function parseSbb(url) {
  // Handle sbbmobile.ch short links
  if (url.includes('sbbmobile.ch')) {
    const resolved = await resolveShortLink(url);
    if (resolved) return parseSbb(resolved);
    throw new Error('Kurzlink konnte nicht aufgelöst werden. Bitte öffne den Link im Browser und kopiere die vollständige sbb.ch URL.');
  }

  const u = new URL(url); if (!u.hostname.includes('sbb.ch')) throw new Error('Kein SBB-Link');
  const p = u.searchParams, stops = p.get('stops');
  if (stops) {
    const parts = stops.split('~'); if (parts.length < 2) throw new Error('Start/Ziel nicht erkennbar');
    const pn = s => decodeURIComponent(s).replace(/_I\d+$/, '').replace(/\+/g, ' ').trim();
    const ns = parts.map(pn);
    return { von: ns[0], nach: ns[ns.length-1], via: ns.length>2?ns.slice(1,-1):[], datum: p.get('day')||null, zeit: p.get('time')?p.get('time').replace('_',':'):null };
  }
  const tid = p.get('tripId');
  if (tid) {
    const segs = tid.split('.'), last = segs[segs.length-1];
    let b = last.replace(/-/g,'+').replace(/_/g,'/'); b += '='.repeat((4-b.length%4)%4);
    const raw = atob(b), bytes = new Uint8Array(raw.length);
    for (let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
    const ds = new DecompressionStream('deflate'); const w=ds.writable.getWriter(); w.write(bytes); w.close();
    const buf = await new Response(ds.readable).arrayBuffer();
    const j = JSON.parse(new TextDecoder().decode(new Uint8Array(buf)));
    const r = id => ST[id] || ('Station '+id);
    return { von:r(j.O), nach:r(j.D), via:(j.vias||[]).filter(Boolean).map(v=>typeof v==='object'?r(v.id||v):r(v)), datum:j.d||null, zeit:j.t||null };
  }
  throw new Error('URL-Format nicht erkannt');
}

async function parseUrl() {
  let raw = document.getElementById('urlIn').value.trim(); if (!raw) return;
  raw = extractSbbUrl(raw);
  document.getElementById('urlIn').value = raw;
  const btn = document.querySelector('.url-row .btn-red');
  const orig = btn.textContent;
  if (raw.includes('sbbmobile.ch')) { btn.textContent = '...'; btn.disabled = true; }
  try {
    const d = await parseSbb(raw); pend = d;
    document.getElementById('pvR').textContent = d.von + ' → ' + d.nach;
    const vEl = document.getElementById('pvV');
    if (d.via.length) { vEl.textContent = 'via ' + d.via.join(', '); vEl.style.display = 'block'; } else vEl.style.display = 'none';
    const pts = []; if (d.datum) pts.push(fmtD(d.datum)); if (d.zeit) pts.push(d.zeit+' Uhr');
    document.getElementById('pvM').textContent = pts.join(' · ');
    document.getElementById('pvP').value = '';
    document.getElementById('pvSbbLink').href = raw;
    document.getElementById('pv').classList.add('show');
    setTimeout(() => document.getElementById('pvP').focus(), 100);
  } catch (e) { msg(e.message, 'error'); }
  btn.textContent = orig; btn.disabled = false;
}

async function generateReceipt(trip, sbbUrl) {
  const c = document.createElement('canvas');
  c.width = 800; c.height = 520;
  const ctx = c.getContext('2d');

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.roundRect(0, 0, 800, 520, 16);
  ctx.fill();

  // Header bar
  ctx.fillStyle = '#1050a0';
  ctx.roundRect(0, 0, 800, 80, [16, 16, 0, 0]);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.fillText('Reisebeleg', 32, 52);

  // Date top right
  ctx.font = '18px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const now = new Date().toLocaleDateString('de-CH') + ' ' + new Date().toLocaleTimeString('de-CH', {hour:'2-digit',minute:'2-digit'});
  ctx.textAlign = 'right';
  ctx.fillText('Erstellt: ' + now, 768, 52);
  ctx.textAlign = 'left';

  // Route
  ctx.fillStyle = '#1050a0';
  ctx.font = 'bold 32px -apple-system, sans-serif';
  ctx.fillText(trip.von + '  →  ' + trip.nach, 32, 140);

  // Details grid
  ctx.font = '16px -apple-system, sans-serif';
  ctx.fillStyle = '#64748b';
  const details = [];
  if (trip.datum) details.push(['Datum', fmtD(trip.datum)]);
  if (trip.zeit) details.push(['Abfahrt', trip.zeit + ' Uhr']);
  if (trip.klasse) details.push(['Klasse', trip.klasse]);
  details.push(['Preis', 'CHF ' + trip.preis.toFixed(2)]);
  if (trip.betreff) details.push(['Betreff', trip.betreff]);

  let y = 185;
  details.forEach(([label, value]) => {
    ctx.fillStyle = '#94a3b8';
    ctx.font = '15px -apple-system, sans-serif';
    ctx.fillText(label, 32, y);
    ctx.fillStyle = '#1a1a2e';
    ctx.font = '18px -apple-system, sans-serif';
    ctx.fillText(value, 180, y);
    y += 36;
  });

  // Divider
  y += 10;
  ctx.strokeStyle = '#e2e8f0';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(32, y); ctx.lineTo(768, y); ctx.stroke();
  y += 25;

  // Price highlight
  ctx.fillStyle = '#eafaea';
  ctx.roundRect(32, y, 736, 60, 10);
  ctx.fill();
  ctx.fillStyle = '#40c040';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.fillText('CHF ' + trip.preis.toFixed(2), 52, y + 40);

  // URL reference
  y += 85;
  ctx.fillStyle = '#94a3b8';
  ctx.font = '12px -apple-system, sans-serif';
  if (sbbUrl) {
    const urlShort = sbbUrl.length > 90 ? sbbUrl.slice(0, 90) + '...' : sbbUrl;
    ctx.fillText('Ref: ' + urlShort, 32, y);
  }

  // Convert to blob
  return new Promise(resolve => {
    c.toBlob(blob => resolve(blob), 'image/png');
  });
}

async function autoAttachReceipt(trip, sbbUrl) {
  try {
    const blob = await generateReceipt(trip, sbbUrl);
    if (!blob) return;
    const fileName = 'Beleg_' + trip.von + '_' + trip.nach + '_' + (trip.datum || 'keinDatum') + '.png';
    const fid = 'f_' + uid();
    const data = await blob.arrayBuffer();
    const db = await openDB();
    await new Promise((r, j) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put({ id: fid, name: fileName, type: 'image/png', size: blob.size, data, created: Date.now() });
      tx.oncomplete = () => r(); tx.onerror = () => j(tx.error);
    });
    trip.files.push({ fileId: fid, name: fileName, type: 'image/png', size: blob.size });
  } catch (e) { console.error('Receipt generation failed:', e); }
}

async function confirmTrip() {
  if (!pend) return;
  const pr = parseFloat(document.getElementById('pvP').value);
  if (isNaN(pr)||pr<=0) { msg('Bitte Preis eingeben.','error'); return; }
  const kl = document.getElementById('pvK').value, ret = document.getElementById('pvR2').value==='retour', bet = document.getElementById('pvB').value.trim();

  const totalPreis = ret ? pr * 2 : pr;

function getFiltered() {
  let list = [...trips];
  const month = document.getElementById('fMonth').value;
  if (month) list = list.filter(t => t.datum && t.datum.startsWith(month));
  const kat = document.getElementById('fKat').value;
  if (kat !== 'all') list = list.filter(t => (t.kategorie||'Reisekosten GSI & VS (öV)') === kat);
  const archive = document.getElementById('fArchive').value;
  if (archive === 'open') list = list.filter(t => !t.archived);
  else if (archive === 'archived') list = list.filter(t => t.archived);
  const sort = document.getElementById('fSort').value;
  if (sort !== 'manual') {
    list.sort((a, b) => {
      switch(sort) {
        case 'date-desc': return (b.datum||'').localeCompare(a.datum||'');
        case 'date-asc': return (a.datum||'').localeCompare(b.datum||'');
        case 'price-desc': return b.preis - a.preis;
        case 'price-asc': return a.preis - b.preis;
        case 'route': return tripLabel(a).localeCompare(tripLabel(b));
        default: return 0;
      }
    });
  }
  return list;
}

function resetFilters() {
  document.getElementById('fMonth').value = '';
  document.getElementById('fSort').value = 'manual';
  document.getElementById('fArchive').value = 'open';
  document.getElementById('fKat').value = 'all';
  render();
}

function renderStats() {
  if (!trips.length) { document.getElementById('statsContent').innerHTML = ''; return; }
  const total = trips.reduce((s,t)=>s+t.preis,0);
  let html = '';

  // KPI cards: Offen + GA-Vergleich
  const openTrips = trips.filter(t => !t.archived);
  const openTotal = openTrips.reduce((s,t) => s+t.preis, 0);
  const oevTotal = trips.filter(t => (t.kategorie||'').startsWith('Reisekosten')).reduce((s,t) => s+t.preis, 0);
  const gaPreis = 3995;
  const gaDiff = gaPreis - oevTotal;
  const gaPct = Math.min(Math.round(oevTotal / gaPreis * 100), 100);

  html += '<div class="stat-section"><div class="stat-grid">';
  html += `<div class="stat-card">
    <div class="sc-val">${openTrips.length > 0 ? 'CHF ' + openTotal.toFixed(0) : '✓'}</div>
    <div class="sc-label">${openTrips.length > 0 ? openTrips.length + ' offen' : 'Alles abgerechnet'}</div>
    <div class="sc-sub">${openTrips.length > 0 ? 'noch abzurechnen' : ''}</div>
  </div>`;
  html += `<div class="stat-card">
    <div class="sc-val" style="font-size:${gaDiff > 0 ? '18' : '20'}px">${gaDiff > 0 ? 'CHF ' + gaDiff.toFixed(0) : 'GA lohnt sich!'}</div>
    <div class="sc-label">GA-Vergleich</div>
    <div style="margin-top:6px;height:6px;background:var(--g200);border-radius:3px;overflow:hidden">
      <div style="height:100%;width:${gaPct}%;background:${gaPct>=100?'var(--accent)':'var(--brand)'};border-radius:3px;transition:width 0.3s"></div>
    </div>
    <div class="sc-sub">CHF ${oevTotal.toFixed(0)} / ${gaPreis.toLocaleString('de-CH')} (${gaPct}%)</div>
  </div>`;
  html += '</div></div>';

  // By Category
  const kats = {};
  trips.forEach(t => { const k = t.kategorie || 'Reisekosten GSI & VS (öV)'; if (!kats[k]) kats[k] = { count: 0, total: 0 }; kats[k].count++; kats[k].total += t.preis; });
  const sortedKats = Object.entries(kats).sort((a,b) => b[1].total - a[1].total);
  const maxKat = Math.max(...sortedKats.map(k => k[1].total));
  html += '<div class="stat-section"><div class="stat-title">Nach Kategorie</div><div class="bar-chart">';
  sortedKats.forEach(([k, d]) => {
    const pct = Math.round(d.total / maxKat * 100);
    const pctTotal = Math.round(d.total / total * 100);
    html += `<div class="bar-row"><div class="bar-label">${katBadge(k)}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-val">CHF ${d.total.toFixed(0)}</div></div>`;
  });
  html += '</div><div class="stat-list" style="margin-top:8px">';
  sortedKats.forEach(([k, d]) => {
    const pctTotal = Math.round(d.total / total * 100);
    html += `<div class="stat-row"><span class="label">${katBadge(k)} <span class="sub">${d.count}× · ${pctTotal}%</span></span><span class="value">CHF ${d.total.toFixed(2)}</span></div>`;
  });
  html += '</div></div>';

  // Monthly spending
  const months = {};
  trips.forEach(t => { const m = t.datum ? t.datum.slice(0, 7) : 'k.A.'; months[m] = (months[m] || 0) + t.preis; });
  const sortedMonths = Object.entries(months).sort((a,b) => a[0].localeCompare(b[0]));
  const maxMonth = Math.max(...sortedMonths.map(m => m[1]));
  html += '<div class="stat-section"><div class="stat-title">Ausgaben pro Monat</div><div class="bar-chart">';
  sortedMonths.forEach(([m, v]) => {
    const label = m === 'k.A.' ? 'k.A.' : m.slice(2).replace('-', '/');
    const pct = Math.round(v / maxMonth * 100);
    html += `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-val">CHF ${v.toFixed(0)}</div></div>`;
  });
  html += '</div></div>';

  // By Betreff
  const betreffs = {};
  trips.forEach(t => { const b = t.betreff || 'Ohne Betreff'; betreffs[b] = (betreffs[b] || 0) + t.preis; });
  const sortedBet = Object.entries(betreffs).sort((a,b) => b[1] - a[1]);
  if (sortedBet.length > 1 || sortedBet[0]?.[0] !== 'Ohne Betreff') {
    html += '<div class="stat-section"><div class="stat-title">Nach Betreff</div><div class="stat-list">';
    sortedBet.forEach(([b, v]) => {
      const pct = Math.round(v / total * 100);
      html += `<div class="stat-row"><span class="label">${esc(b)} <span class="sub">${pct}%</span></span><span class="value">CHF ${v.toFixed(2)}</span></div>`;
    });
    html += '</div></div>';
  }

  // Top routes / entries
  const routes = {};
  trips.forEach(t => {
    const r = tripLabel(t);
    if (!routes[r]) routes[r] = { count: 0, total: 0 };
    routes[r].count++; routes[r].total += t.preis;
  });
  const topRoutes = Object.entries(routes).sort((a,b) => b[1].count - a[1].count).slice(0, 5);
  html += '<div class="stat-section"><div class="stat-title">Häufigste Einträge</div><div class="stat-list">';
  topRoutes.forEach(([r, d]) => {
    html += `<div class="stat-row"><span class="label">${esc(r)} <span class="sub">${d.count}×</span></span><span class="value">CHF ${d.total.toFixed(2)}</span></div>`;
  });
  html += '</div></div>';

  document.getElementById('statsContent').innerHTML = html;
}

async function attachFile(tid, el) {
  const trip = trips.find(t=>t.id===tid); if(!trip) return;
  for (const file of el.files) {
    if (!file.type.startsWith('image/') && file.type !== 'application/pdf') { msg('Nur Bilder und PDFs.','error'); continue; }
    if (file.size > 20*1024*1024) { msg('Max 20MB pro Datei.','error'); continue; }
    const fid = 'f_'+uid();
    try { await saveFile(fid, file); trip.files.push({ fileId:fid, name:file.name, type:file.type, size:file.size }); } catch(e) { msg('Fehler: '+e.message,'error'); }
  }
  save(); msg(el.files.length+(el.files.length===1?' Datei':' Dateien')+' angehängt!','success'); el.value='';
}
async function removeAttachment(tid,fid){const t=trips.find(x=>x.id===tid);if(!t)return;await deleteFile(fid).catch(()=>{});t.files=t.files.filter(f=>f.fileId!==fid);save()}
async function viewAttachment(fid,fn){
  try{const f=await getFile(fid);if(!f){msg('Datei nicht gefunden.','error');return}
  const blob=new Blob([f.data],{type:f.type}),url=URL.createObjectURL(blob),lb=document.getElementById('lb'),c=document.getElementById('lbContent'),d=document.getElementById('lbDl');
  if(f.type.startsWith('image/'))c.innerHTML='<img src="'+url+'">';else c.innerHTML='<iframe src="'+url+'"></iframe>';
  d.href=url;d.download=fn;lb.classList.add('show');lb._blobUrl=url}catch(e){msg('Fehler: '+e.message,'error')}
}
function closeLb(ev){if(ev&&ev.target!==document.getElementById('lb')&&!ev.target.classList.contains('lb-close'))return;const lb=document.getElementById('lb');lb.classList.remove('show');if(lb._blobUrl){URL.revokeObjectURL(lb._blobUrl);lb._blobUrl=null}document.getElementById('lbContent').innerHTML=''}

function moveTrip(id,dir){const i=trips.findIndex(t=>t.id===id);if(i<0)return;const n=i+dir;if(n<0||n>=trips.length)return;[trips[i],trips[n]]=[trips[n],trips[i]];save()}
function toggleExpand(id){
  // Close all other expands
  document.querySelectorAll('.t-expand.show').forEach(el => {
    if (el.id !== 'ax-'+id) el.classList.remove('show');
  });
  const el=document.getElementById('ax-'+id);
  el.classList.toggle('show');
}
function toggleArchive(id){const t=trips.find(x=>x.id===id);if(!t)return;t.archived=!t.archived;save();msg(tripLabel(t)+(t.archived?' archiviert.':' geöffnet.'),'success')}
function startEdit(id){document.getElementById('tv-'+id).style.display='none';const ax=document.getElementById('ax-'+id);if(ax)ax.classList.remove('show');document.getElementById('ef-'+id).style.display='block'}
function cancelEdit(id){document.getElementById('tv-'+id).style.display='';document.getElementById('ef-'+id).style.display='none'}
function saveEdit(id){
  const t=trips.find(x=>x.id===id);if(!t)return;
  const kat=document.getElementById('ekat-'+id).value;
  const v=document.getElementById('ev-'+id).value.trim(),n=document.getElementById('en-'+id).value.trim();
  const beschr=document.getElementById('ebeschr-'+id).value.trim();
  const p=parseFloat(document.getElementById('ep-'+id).value),d=document.getElementById('ed-'+id).value;
  const k=document.getElementById('ek-'+id).value,b=document.getElementById('eb-'+id).value.trim();
  const ret=document.getElementById('eret-'+id).value==='retour';
  const isTrip=kat.startsWith('Reisekosten');
  if(isTrip&&(!v||!n||isNaN(p))){msg('Von, Nach und Preis ausfüllen.','error');return}
  if(!isTrip&&(!beschr||isNaN(p))){msg('Beschreibung und Preis ausfüllen.','error');return}
  t.kategorie=kat;t.von=isTrip?v:'';t.nach=isTrip?n:'';t.beschreibung=isTrip?'':beschr;
  t.preis=p;t.datum=d||null;t.klasse=k||null;t.betreff=b;t.retour=ret;
  save();msg(tripLabel(t)+' aktualisiert!','success');
}
async function del(id){const t=trips.find(x=>x.id===id);if(!confirm((t?tripLabel(t):'Spese')+' wirklich löschen?'))return;await deleteFilesForTrip(id);trips=trips.filter(x=>x.id!==id);save()}
async function clr(){if(!confirm('Alle Spesen und Belege löschen?'))return;for(const t of trips)await deleteFilesForTrip(t.id);trips=[];save()}
async function cleanupOrphans(){
  let removed=0;
  for(const t of trips){
    if(!t.files||!t.files.length)continue;
    const valid=[];
    for(const f of t.files){
      try{const d=await getFile(f.fileId);if(d)valid.push(f);else removed++}catch{removed++}
    }
    t.files=valid;
  }
  if(removed>0){save();msg(removed+' ungültige Beleg-Verweise entfernt.','success')}
}

function dlFile(n,t,c){
  let blob;
  if(t.includes('csv')){const enc=new TextEncoder(),bom=new Uint8Array([0xEF,0xBB,0xBF]),d=enc.encode(c),combined=new Uint8Array(bom.length+d.length);combined.set(bom);combined.set(d,bom.length);blob=new Blob([combined],{type:'text/csv'})}
  else blob=new Blob([c],{type:t});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=n;document.body.append(a);a.click();a.remove();
}

function xlsx(){
  const filtered = getFiltered();
  const data = filtered.length ? filtered : trips;
  if (!data.length) { msg('Keine Spesen zum Exportieren.','error'); return; }

  // ── Sheet 1: Spesenliste ──
  const headers = ['Nr.','Kategorie','Von','Nach','Beschreibung','Art','Preis (CHF)','Datum','Klasse','Betreff','Status','Belege'];
  const rows = [headers];
  
  data.forEach((t, i) => {
    rows.push([
      i + 1,
      t.kategorie || 'Reisekosten GSI & VS (öV)',
      t.von || '',
      t.nach || '',
      t.beschreibung || '',
      t.retour ? 'Retour' : 'Einfach',
      t.preis,
      t.datum || '',
      t.klasse || '',
      t.betreff || '',
      t.archived ? 'Exportiert' : 'Offen',
      (t.files || []).map(f => f.name).join('; ')
    ]);
  });

  // Total row
  const totalRow = data.reduce((s, t) => s + t.preis, 0);
  rows.push([]);
  rows.push(['', '', '', '', '', 'TOTAL', totalRow, '', '', '', '', '']);

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    { wch: 5 },   // Nr
    { wch: 14 },  // Kategorie
    { wch: 18 },  // Von
    { wch: 18 },  // Nach
    { wch: 25 },  // Beschreibung
    { wch: 8 },   // Art
    { wch: 12 },  // Preis
    { wch: 12 },  // Datum
    { wch: 10 },  // Klasse
    { wch: 18 },  // Betreff
    { wch: 10 },  // Status
    { wch: 30 },  // Belege
  ];

  // Format price column as number with 2 decimals (col 6)
  for (let r = 1; r <= data.length; r++) {
    const cell = XLSX.utils.encode_cell({ r, c: 6 });
    if (ws[cell]) { ws[cell].t = 'n'; ws[cell].z = '#,##0.00'; }
  }
  // Total cell
  const totalCell = XLSX.utils.encode_cell({ r: data.length + 2, c: 6 });
  if (ws[totalCell]) { ws[totalCell].t = 'n'; ws[totalCell].z = '#,##0.00'; }

  // Format date column (col 7)
  for (let r = 1; r <= data.length; r++) {
    const cell = XLSX.utils.encode_cell({ r, c: 7 });
    if (ws[cell] && ws[cell].v) {
      const d = new Date(ws[cell].v + 'T00:00:00');
      if (!isNaN(d)) {
        ws[cell].t = 'd';
        ws[cell].v = d;
        ws[cell].z = 'dd.mm.yyyy';
      }
    }
  }

  // ── Sheet 2: Zusammenfassung ──
  const sumRows = [['Spesen-Zusammenfassung'], []];
  
  // Key metrics
  const avg = totalRow / data.length;
  const oevXlsx = data.filter(t => (t.kategorie||'').startsWith('Reisekosten')).reduce((s,t) => s+t.preis, 0);
  const openXlsx = data.filter(t => !t.archived);
  sumRows.push(['Anzahl Spesen', data.length]);
  sumRows.push(['Gesamtbetrag', totalRow]);
  sumRows.push(['Davon offen', openXlsx.reduce((s,t)=>s+t.preis,0)]);
  sumRows.push(['Durchschnitt', Math.round(avg * 100) / 100]);
  sumRows.push([]);
  sumRows.push(['GA-Vergleich (CHF 3\'995)']);
  sumRows.push(['ÖV-Ausgaben total', oevXlsx]);
  sumRows.push(['Differenz zum GA', 3995 - oevXlsx]);
  sumRows.push([]);

  // By category
  sumRows.push(['Nach Kategorie', '', '']);
  sumRows.push(['Kategorie', 'Anzahl', 'Betrag (CHF)']);
  const kats = {};
  data.forEach(t => { const k = t.kategorie || 'Reisekosten GSI & VS (öV)'; if (!kats[k]) kats[k] = { count: 0, total: 0 }; kats[k].count++; kats[k].total += t.preis; });
  Object.entries(kats).sort((a, b) => b[1].total - a[1].total).forEach(([k, d]) => {
    sumRows.push([k, d.count, d.total]);
  });
  sumRows.push([]);

  // By betreff
  const bets = {};
  data.forEach(t => { const b = t.betreff || 'Ohne Betreff'; bets[b] = (bets[b] || 0) + t.preis; });
  const sortedBets = Object.entries(bets).sort((a, b) => b[1] - a[1]);
  if (sortedBets.length > 1 || sortedBets[0]?.[0] !== 'Ohne Betreff') {
    sumRows.push(['Nach Betreff', '', '']);
    sumRows.push(['Betreff', '', 'Betrag (CHF)']);
    sortedBets.forEach(([b, v]) => { sumRows.push([b, '', v]); });
    sumRows.push([]);
  }

  // By month
  const months = {};
  data.forEach(t => { const m = t.datum ? t.datum.slice(0, 7) : 'Ohne Datum'; months[m] = (months[m] || 0) + t.preis; });
  sumRows.push(['Nach Monat', '', '']);
  sumRows.push(['Monat', '', 'Betrag (CHF)']);
  Object.entries(months).sort((a, b) => a[0].localeCompare(b[0])).forEach(([m, v]) => {
    sumRows.push([m, '', v]);
  });

  const ws2 = XLSX.utils.aoa_to_sheet(sumRows);
  ws2['!cols'] = [{ wch: 22 }, { wch: 10 }, { wch: 14 }];

  // Format numbers on sheet 2
  for (let r = 0; r < sumRows.length; r++) {
    for (let c = 1; c <= 2; c++) {
      const cell = XLSX.utils.encode_cell({ r, c });
      if (ws2[cell] && typeof ws2[cell].v === 'number') {
        ws2[cell].z = c === 1 && Number.isInteger(ws2[cell].v) ? '0' : '#,##0.00';
      }
    }
  }

  // ── Build workbook ──
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Spesen');
  XLSX.utils.book_append_sheet(wb, ws2, 'Zusammenfassung');

  // Filename with date range
  const dates = data.filter(t => t.datum).map(t => t.datum).sort();
  let filename = 'Spesen';
  if (dates.length) {
    const from = dates[0].slice(0, 7).replace('-', '');
    const to = dates[dates.length - 1].slice(0, 7).replace('-', '');
    filename += '_' + from + (from !== to ? '-' + to : '');
  }
  filename += '.xlsx';

  XLSX.writeFile(wb, filename);
  msg('Excel exportiert: ' + filename, 'success');
}

function xlsxBlob() {
  const filtered = getFiltered();
  const data = filtered.length ? filtered : trips;
  if (!data.length) return null;
  // Reuse xlsx logic by temporarily capturing
  const rows=[['Nr.','Kategorie','Von','Nach','Beschreibung','Art','Preis (CHF)','Datum','Klasse','Betreff','Status','Belege']];
  data.forEach((t,i)=>{rows.push([i+1,t.kategorie||'',t.von||'',t.nach||'',t.beschreibung||'',t.retour?'Retour':'Einfach',t.preis,t.datum||'',t.klasse||'',t.betreff||'',t.archived?'Exportiert':'Offen',(t.files||[]).map(f=>f.name).join('; ')])});
  const totalRow=data.reduce((s,t)=>s+t.preis,0);
  rows.push([]);rows.push(['','','','','','TOTAL',totalRow]);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Spesen');
  const dates=data.filter(t=>t.datum).map(t=>t.datum).sort();
  let filename='Spesen';
  if(dates.length){const f=dates[0].slice(0,7).replace('-',''),t=dates[dates.length-1].slice(0,7).replace('-','');filename+='_'+f+(f!==t?'-'+t:'');}
  filename+='.xlsx';
  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  return { blob: new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}), filename, data };
}

async function emailExport() {
  const btn=document.getElementById('btnEmail');
  btn.disabled=true; btn.textContent='Wird vorbereitet...';

  try {
    const filtered = getFiltered();
    const data = filtered.length ? filtered : trips;
    if (!data.length) { msg('Keine Spesen zum Exportieren.','error'); btn.disabled=false; btn.textContent='Spesen per Email senden'; return; }

    // 1. Generate Excel
    const xl = xlsxBlob();
    if (!xl) { msg('Export fehlgeschlagen.','error'); btn.disabled=false; btn.textContent='Spesen per Email senden'; return; }

    // 2. Collect all receipts into files array
    const allFiles = [new File([xl.blob], xl.filename, { type: xl.blob.type })];
    let belegCount = 0;

    for (const t of data) {
      for (const f of (t.files || [])) {
        try {
          const fd = await getFile(f.fileId);
          if (fd) {
            const prefix = (t.von && t.nach ? t.von + '-' + t.nach : t.beschreibung || 'Spese').replace(/[^a-zA-ZäöüÄÖÜ0-9]/g, '_');
            allFiles.push(new File([new Blob([fd.data], { type: fd.type })], prefix + '_' + fd.name, { type: fd.type }));
            belegCount++;
          }
        } catch(e) {}
      }
    }

    // 3. Summary text
    const total = data.reduce((s,t) => s+t.preis, 0);
    const lines = data.map((t,i) => `${i+1}. ${tripLabel(t)} | CHF ${t.preis.toFixed(2)}${t.datum ? ' | ' + fmtD(t.datum) : ''}${t.betreff ? ' | ' + t.betreff : ''}`);
    const text = 'Spesenabrechnung\n\n' + lines.join('\n') + '\n\nTOTAL: CHF ' + total.toFixed(2) + ' (' + data.length + ' Spesen, ' + belegCount + ' Belege)';

    // 4. Try sharing all files together
    let shared = false;
    if (navigator.canShare) {
      try {
        const shareData = { title: 'Spesenabrechnung CHF ' + total.toFixed(2), text: text, files: allFiles };
        if (navigator.canShare(shareData)) {
          await navigator.share(shareData);
          shared = true;
        }
      } catch(e) {
        if (e.name === 'AbortError') { btn.disabled=false; btn.textContent='Spesen per Email senden'; return; }
      }

      // 5. If too many files, try ZIP fallback
      if (!shared && allFiles.length > 2 && typeof JSZip !== 'undefined') {
        try {
          const zip = new JSZip();
          zip.file(xl.filename, xl.blob);
          for (let i = 1; i < allFiles.length; i++) {
            zip.file(allFiles[i].name, await allFiles[i].arrayBuffer());
          }
          const zipBlob = await zip.generateAsync({ type: 'blob' });
          const zipFile = new File([zipBlob], xl.filename.replace('.xlsx', '_mit_Belegen.zip'), { type: 'application/zip' });
          const zipShare = { title: 'Spesenabrechnung CHF ' + total.toFixed(2), text: text, files: [zipFile] };
          if (navigator.canShare(zipShare)) {
            await navigator.share(zipShare);
            shared = true;
          }
        } catch(e) {
          if (e.name === 'AbortError') { btn.disabled=false; btn.textContent='Spesen per Email senden'; return; }
        }
      }
    }

    if (shared) {
      msg('Spesenabrechnung mit ' + belegCount + ' Belegen geteilt!', 'success');
      data.forEach(t => t.archived = true);
      save();
    } else {
      // Final fallback: download files separately
      const a = document.createElement('a');
      a.href = URL.createObjectURL(xl.blob);
      a.download = xl.filename;
      a.click();
      URL.revokeObjectURL(a.href);
      msg('Excel heruntergeladen. Teilen-Dialog nicht verfügbar.', 'success');
    }
  } catch(e) {
    msg('Fehler: ' + e.message, 'error');
  }

  btn.disabled=false; btn.textContent='Spesen per Email senden';
}

// ══════════════════════════════════════════
// Odoo Integration
// ══════════════════════════════════════════
function loadOdooSettings() {
  const s = JSON.parse(localStorage.getItem('sbb-odoo') || '{}');
  if (s.email) document.getElementById('odooEmail').value = s.email;
  if (s.ref) document.getElementById('odooRef').value = s.ref;
  if (s.sender) document.getElementById('odooSender').value = s.sender;
}
function saveOdooSettings() {
  localStorage.setItem('sbb-odoo', JSON.stringify({
    email: document.getElementById('odooEmail').value.trim(),
    ref: document.getElementById('odooRef').value.trim(),
    sender: document.getElementById('odooSender').value.trim()
  }));
}
document.getElementById('odooEmail').addEventListener('change', saveOdooSettings);
document.getElementById('odooRef').addEventListener('change', saveOdooSettings);
document.getElementById('odooSender').addEventListener('change', saveOdooSettings);

function getOdooSettings() {
  const email = document.getElementById('odooEmail').value.trim();
  const ref = document.getElementById('odooRef').value.trim() || 'REISE';
  if (!email) { msg('Bitte zuerst Odoo-Email in den Einstellungen eintragen.', 'error'); document.getElementById('odooSetup').open = true; return null; }
  return { email, ref };
}

async function sendToOdoo(tripId) {
  const cfg = getOdooSettings(); if (!cfg) return;
  const t = trips.find(x => x.id === tripId); if (!t) return;
  const sender = document.getElementById('odooSender').value.trim();

  const subject = `${cfg.ref} ${t.preis.toFixed(2)}`;
  const bodyLines = [
    `An: ${cfg.email}`,
    `Betreff: ${subject}`,
    '',
    tripLabel(t),
    t.kategorie && t.kategorie !== 'Reisekosten GSI & VS (öV)' ? `Kategorie: ${t.kategorie}` : '',
    t.datum ? `Datum: ${fmtD(t.datum)}` : '',
    t.klasse || '',
    t.betreff ? `Betreff: ${t.betreff}` : '',
  ].filter(Boolean).join('\n');

  // Collect files
  const shareFiles = [];
  for (const f of (t.files || [])) {
    try {
      const fd = await getFile(f.fileId);
      if (fd) shareFiles.push(new File([new Blob([fd.data], {type:fd.type})], fd.name, {type:fd.type}));
    } catch(e) {}
  }

  // Share with files
  if (shareFiles.length > 0 && navigator.canShare) {
    try {
      const shareData = { title: subject, text: bodyLines, files: shareFiles };
      if (navigator.canShare(shareData)) {
        await navigator.share(shareData);
        t.archived = true; save();
        msg(tripLabel(t) + ' geteilt + archiviert!', 'success');
        return;
      }
    } catch (e) { if (e.name === 'AbortError') return; }
  }

  // Fallback: mailto
  const mailto = `mailto:${encodeURIComponent(cfg.email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyLines + (shareFiles.length ? '\n\n⚠️ Bitte Beleg manuell anhängen.' : ''))}`;
  window.location.href = mailto;
  t.archived = true; save();
  msg('Email geöffnet. An: ' + cfg.email, 'success');
}

async function sendAllToOdoo() {
  const cfg = getOdooSettings(); if (!cfg) return;
  const filtered = getFiltered();
  if (!filtered.length) { msg('Keine Spesen zum Senden.', 'error'); return; }
  const sender = document.getElementById('odooSender').value.trim();

  const btn = document.getElementById('btnOdoo');
  btn.disabled = true;
  btn.textContent = '⏳ Wird vorbereitet...';

  const total = filtered.reduce((s,t) => s + t.preis, 0);
  const subject = `${cfg.ref} Sammelabrechnung CHF ${total.toFixed(2)}`;
  const lines = filtered.map((t, i) =>
    `${i+1}. ${tripLabel(t)} | CHF ${t.preis.toFixed(2)}${t.datum ? ' | ' + fmtD(t.datum) : ''}${t.betreff ? ' | ' + t.betreff : ''}`
  );
  lines.push('', `TOTAL: CHF ${total.toFixed(2)} (${filtered.length} Spesen)`);

  const bodyText = [
    `An: ${cfg.email}`,
    `Betreff: ${subject}`,
    sender ? `Von: ${sender}` : '',
    '', ...lines
  ].filter(Boolean).join('\n');

  // Collect ALL files from all trips into a single ZIP
  try {
    const allFiles = [];
    for (const t of filtered) {
      for (const f of (t.files || [])) {
        const fd = await getFile(f.fileId);
        if (fd) allFiles.push({ name: fd.name, data: fd.data, type: fd.type, trip: tripLabel(t) });
      }
    }

    if (allFiles.length > 0 && typeof JSZip !== 'undefined') {
      // Bundle all files into one ZIP
      const zip = new JSZip();
      const usedNames = {};
      allFiles.forEach(f => {
        // Avoid duplicate filenames
        let name = f.name;
        if (usedNames[name]) { usedNames[name]++; const ext = name.lastIndexOf('.'); name = name.slice(0, ext) + '_' + usedNames[name] + name.slice(ext); }
        else usedNames[name] = 1;
        zip.file(name, f.data);
      });
      // Add summary CSV
      const enc = new TextEncoder(), bom = new Uint8Array([0xEF,0xBB,0xBF]);
      const csvLines = ['Bezeichnung,Preis,Datum,Betreff'];
      filtered.forEach(t => csvLines.push(`"${tripLabel(t)}",${t.preis.toFixed(2)},${t.datum||''},"${t.betreff||''}"`));
      csvLines.push(`"TOTAL",${total.toFixed(2)},,`);
      const csvData = enc.encode(csvLines.join('\n'));
      const csvCombined = new Uint8Array(bom.length + csvData.length);
      csvCombined.set(bom); csvCombined.set(csvData, bom.length);
      zip.file('uebersicht.csv', csvCombined);

      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const zipFile = new File([zipBlob], 'spesen-belege.zip', { type: 'application/zip' });

      if (navigator.canShare && navigator.canShare({ files: [zipFile] })) {
        try {
          await navigator.share({ title: subject, text: bodyText, files: [zipFile] });
          filtered.forEach(t => t.archived = true); save();
          msg('Sammelabrechnung mit ' + allFiles.length + ' Belegen geteilt + archiviert!', 'success');
          btn.disabled = false; btn.textContent = '✉️ Alle Spesen senden';
          return;
        } catch (e) { if (e.name === 'AbortError') { btn.disabled = false; btn.textContent = '✉️ Alle Spesen senden'; return; } }
      }
    }

    // No files or share not available: try share without files
    if (navigator.canShare) {
      try {
        const sd = { title: subject, text: bodyText };
        if (navigator.canShare(sd)) {
          await navigator.share(sd);
          filtered.forEach(t => t.archived = true); save();
          msg('Sammelabrechnung geteilt + archiviert!', 'success');
          btn.disabled = false; btn.textContent = '✉️ Alle Spesen senden';
          return;
        }
      } catch (e) { if (e.name === 'AbortError') { btn.disabled = false; btn.textContent = '✉️ Alle Spesen senden'; return; } }
    }
  } catch(e) { console.error(e); }

  // Final fallback: mailto
  const mailto = `mailto:${encodeURIComponent(cfg.email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(lines.join('\n') + '\n\n⚠️ Bitte Belege als ZIP anhängen.')}`;
  window.location.href = mailto;
  filtered.forEach(t => t.archived = true); save();
  msg('Email geöffnet. Belege separat als ZIP anhängen.', 'success');
  btn.disabled = false; btn.textContent = '✉️ Alle Spesen senden';
}

// ══════════════════════════════════════════
// Auto-Paste & Share Target
// ══════════════════════════════════════════
async function autoPaste() {
  const input = document.getElementById('urlIn');
  try {
    if (navigator.clipboard && navigator.clipboard.readText) {
      const text = await navigator.clipboard.readText();
      if (text) {
        const url = extractSbbUrl(text);
        if (url.includes('sbb')) {
          input.value = url;
          parseUrl();
          return;
        }
        input.value = text.trim();
        input.focus();
        input.select();
        return;
      }
    }
  } catch (e) {}
  // Fallback: focus input for manual paste
  input.focus();
  input.value = '';
  // Try execCommand paste as secondary fallback
  try { document.execCommand('paste'); if (input.value) { parseUrl(); return; } } catch(e) {}
  msg('Ins Feld tippen und lange drücken → Einfügen', 'success');
}

function handleShareTarget() {
  const params = new URLSearchParams(window.location.search);
  const shared = params.get('url') || params.get('text') || params.get('title') || '';
  if (!shared) return;
  const url = extractSbbUrl(shared);
  if (url.includes('sbb')) {
    window.history.replaceState({}, '', window.location.pathname);
    document.getElementById('urlIn').value = url;
    setTimeout(() => parseUrl(), 300);
  }
}

handleShareTarget();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Init
loadOdooSettings();
render();
cleanupOrphans();
</script>

    const csvR=['Von,Nach,Preis,Datum,Klasse,Betreff,Belege'];
    trips.forEach(t=>{const fn=(t.files||[]).map(f=>f.name).join('; ');csvR.push('"'+t.von+'","'+t.nach+'",'+t.preis.toFixed(2)+','+(t.datum||'')+','+(t.klasse||'')+','+(t.betreff||'')+',"'+fn+'"')});
    csvR.push('"","TOTAL",'+trips.reduce((s,t)=>s+t.preis,0).toFixed(2)+',,,');
    const enc=new TextEncoder(),bom=new Uint8Array([0xEF,0xBB,0xBF]),d=enc.encode(csvR.join('\n')),comb=new Uint8Array(bom.length+d.length);comb.set(bom);comb.set(d,bom.length);
    zip.file('uebersicht.csv',comb);

}
